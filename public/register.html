<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for the Student Project Management System.">
    <title>SPMS — Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">📚</div>
                    <h1>Create Account</h1>
                    <p>Join the Student Project Management System</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Choose a password" required minlength="6" autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" class="form-control" id="department" name="department" placeholder="e.g. Computer Science">
                    </div>

                    <div class="form-group">
                        <label for="role">Role</label>
                        <select class="form-control" id="role" name="role" required>
                            <option value="">Select your role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty / Mentor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                        Create Account
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p style="color: var(--text-secondary); font-size: 14px;">
                        Already have an account? <a href="/">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
