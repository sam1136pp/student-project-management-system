<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Project Management System - Login to manage your academic projects efficiently.">
    <title>SPMS — Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon">📚</div>
                    <h1>SPMS</h1>
                    <p>Student Project Management System</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        Sign In
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p style="color: var(--text-secondary); font-size: 14px;">
                        Don't have an account? <a href="/register.html">Register here</a>
                    </p>
                </div>

                <div class="text-center mt-2" style="border-top: 1px solid var(--border-glass); padding-top: 16px; margin-top: 24px;">
                    <p style="color: var(--text-muted); font-size: 12px;">Demo Credentials</p>
                    <p style="color: var(--text-secondary); font-size: 12px;">
                        Admin: <strong>admin</strong> &nbsp;|&nbsp; 
                        Faculty: <strong>faculty1</strong> &nbsp;|&nbsp;
                        Student: <strong>student1</strong>
                    </p>
                    <p style="color: var(--text-muted); font-size: 11px; margin-top: 4px;">Password for all demo accounts: the username followed by <strong>123</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
